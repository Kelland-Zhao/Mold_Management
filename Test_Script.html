<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  /***禁用鼠标右键***/
  window.onload=function(){       
    document.onkeydown=function(){
      let e=window.event||arguments[0];
      if(e.keyCode==123){         
        return false;
      }
      else if((e.ctrlKey)&&(e.shiftKey)&&(e.keyCode==73)){
        return false;
      }
    }
    document.oncontextmenu=function(){
      return false;
    }
  }

  let timerInterval,timerIntervalFile;
  let arrAem=[];
  let arrMoldInfoScan=[];

  /***初始化日期选择器***/
  function initializationDatePicker(){
    $('.data-datepicker').datepicker({
      "language": "zh-CN",
      "calendarWeeks": true,
      "todayHighlight": true
    });
  }
  
  /***加载窗口时预载数据***/
  $(document).ready(function(){
    initializationDatePicker();
    let loginWorkshop=sessionStorage.getItem("sessionLoginWorkshop");
    let loginProcess=sessionStorage.getItem("sessionLoginProcess");
    let loginId=sessionStorage.getItem("sessionLoginId");
    let loginName=sessionStorage.getItem("sessionLoginName");
    $("#loginWorkshop").text(loginWorkshop);
    $("#loginProcess").text(loginProcess);
    $("#loginId").text(loginId);
    $("#loginName").text(loginName);
    $("#name").text(loginName);
    if(loginWorkshop&&loginProcess&&loginId&&loginName){
      showRunning('','正在加载机台信息……','','',120000);
      google.script.run.withFailureHandler(judgeFailure).withSuccessHandler(result=>{
        if(result[0]=="OK"){
          arrAem=result[1];
          arrPlan=result[2];
          let secTemp=$("#prodInstallMachine");
          dynamicGenerationSelectOption(secTemp,arrAem);
          secTemp=$("#prodUninstallMachine");
          dynamicGenerationSelectOption(secTemp,arrAem);
          showResult('success','机台计划加载成功','','',false,'',2000,true)
        }
        else{
          showResult('error','机台计划加载失败',result[1],'',true,'','',false);
        }
      }).getAem(loginWorkshop,loginProcess);
    }
    else{
      showResult('error','缺失登陆信息','尝试关闭窗口重新登陆','',true,'','',false);
    }
  });

  /***上模***/
  function btnInstallMold(){
    arrMolarrMoldInfo=[];
    $("#moldNoInstall").val("")
    $("#modalInstallMold").modal('show');
  }

  $("#moldNoInstall").on("input",function(){
    arrMoldInfoScan=[];
    let inputVal=$("#moldNoInstall").val().replace(/[\n\r]/g,"");
    if(inputVal.length>8&&inputVal.indexOf("模具名称")!=-1&&inputVal.indexOf("模具号")!=-1&&inputVal.indexOf("产品名称")!=-1&&inputVal.indexOf("模具步骤")!=-1){
      let arrInputVal=inputVal.trim().substring(inputVal.trim().search("模具名称"),inputVal.trim().length).split(/模具名称[：:]|模具号[：:]|产品名称[：:]|模具步骤[：:]/).filter(v=>v!="").map(v=>v.trim());
      arrMoldInfoScan=arrInputVal;
      let htmlStr="<p>模具名称：<b style='color:red'>"+arrInputVal[0]+"</b></p>"+
                  "<p>模具号：<b style='color:red'>"+arrInputVal[1]+"</b></p>"+
                  "<p>产品名称：<b style='color:red'>"+arrInputVal[2]+"</b></p>"+
                  "<p>模具步骤：<b style='color:red'>"+arrInputVal[3]+"</b></p>"
      showResult('info','模具信息','',htmlStr,true,'','',false);
      $("#moldNoInstall").val(arrInputVal[1]);
    }
  })

  $("#moldNoInstall").on("blur",function(){
    let inputVal=$("#moldNoInstall").val()
    let judge=false;
    if(inputVal.indexOf("模具名称")!=-1&&inputVal.indexOf("模具号")!=-1&&inputVal.indexOf("产品名称")!=-1&&inputVal.indexOf("模具步骤")!=-1){
      judge=(/M\dIM\d{4}/).test(inputVal);
    }
    else{
      judge=(/^M\dIM\d{4}$/).test(inputVal);
    }
    if(inputVal!=""&&!judge){
      showResult('error','模具号不对',inputVal,'',true,'','',false)
      $("#moldNoInstall").val("")
    }
  })

  $("#btnModalInstallMold").on("click",function(){
    let moldNoInstall=$("#moldNoInstall").val();
    let machineInstall=$("#prodInstallMachine").val();
    if(arrMoldInfoScan.length==4){
      let loginWorkshop=$("#loginWorkshop").text().trim();
      let loginProcess=$("#loginProcess").text().trim();
      let loginName=$("#loginName").text().trim();
      let now=new Date();
      let nowDate=dayjs(now).format("YYYY-MM-DD");
      let nowHour=now.getHours();
      let shift="";
      if(nowHour<8&&nowHour>=0){shift="夜班"}else if(nowHour<16&&nowHour>=8){shift="早班"}else if(nowHour<24&&nowHour>=16){shift="中班"}
      if(moldNoInstall!=""&&machineInstall!=""){
        showRunning('','正在保存上模信息……','','',120000);
        google.script.run.withFailureHandler(judgeFailure).withSuccessHandler(result=>{
          arrMoldInfoScan=[];
          if(result[0]=="OK"){
            showResult('success','上模信息保存成功','','',false,'',2000,true)
          }
          else{
            showResult('error','上模信息保存失败',result[1],'',true,'','',false);
          }
        }).saveTestInstallMold(loginWorkshop,loginProcess,loginName,nowDate,shift,moldNoInstall,machineInstall,arrMoldInfoScan);
        
      }
      else{
        showResult('error','机台信息错误','确认已选择机台且输入模具号','',true,'','',false);
      }
    }
    else{
      showResult('error','缺失模具信息','确认模具信息完整','',true,'','',false);
    }
  })

  /***下模***/
  function btnUninstallMold(){
    arrMolarrMoldInfo=[];
    $("#moldNoUninstall").val("")
    $("#modalUninstallMold").modal('show');
  }

  $("#moldNoUninstall").on("input",function(){
    arrMoldInfoScan=[];
    let inputVal=$("#moldNoUninstall").val().replace(/[\n\r]/g,"");
    if(inputVal.length>8&&inputVal.indexOf("模具名称")!=-1&&inputVal.indexOf("模具号")!=-1&&inputVal.indexOf("产品名称")!=-1&&inputVal.indexOf("模具步骤")!=-1){
      let arrInputVal=inputVal.trim().substring(inputVal.trim().search("模具名称"),inputVal.trim().length).split(/模具名称[：:]|模具号[：:]|产品名称[：:]|模具步骤[：:]/).filter(v=>v!="").map(v=>v.trim());
      arrMoldInfoScan=arrInputVal;
      let htmlStr="<p>模具名称：<b style='color:red'>"+arrInputVal[0]+"</b></p>"+
                  "<p>模具号：<b style='color:red'>"+arrInputVal[1]+"</b></p>"+
                  "<p>产品名称：<b style='color:red'>"+arrInputVal[2]+"</b></p>"+
                  "<p>模具步骤：<b style='color:red'>"+arrInputVal[3]+"</b></p>"
      showResult('info','模具信息','',htmlStr,true,'','',false);
      $("#moldNoUninstall").val(arrInputVal[1]);
    }
  })

  $("#moldNoUninstall").on("blur",function(){
    let inputVal=$("#moldNoUninstall").val()
    let judge=false;
    if(inputVal.indexOf("模具名称")!=-1&&inputVal.indexOf("模具号")!=-1&&inputVal.indexOf("产品名称")!=-1&&inputVal.indexOf("模具步骤")!=-1){
      judge=(/M\dIM\d{4}/).test(inputVal);
    }
    else{
      judge=(/^M\dIM\d{4}$/).test(inputVal);
    }
    if(inputVal!=""&&!judge){
      showResult('error','模具号不对',inputVal,'',true,'','',false)
      $("#moldNoUninstall").val("")
    }
  })

  $("#btnModalUninstallMold").on("click",function(){
    let moldNoUninstall=$("#moldNoUninstall").val();
    let machineUninstall=$("#prodUninstallMachine").val()
    if(arrMoldInfoScan.length==4){
      let loginWorkshop=$("#loginWorkshop").text().trim();
      let loginProcess=$("#loginProcess").text().trim();
      let loginName=$("#loginName").text().trim();
      let now=new Date();
      let nowDate=dayjs(now).format("YYYY-MM-DD");
      let nowHour=now.getHours();
      let shift="";
      if(nowHour<8&&nowHour>=0){shift="夜班"}else if(nowHour<16&&nowHour>=8){shift="早班"}else if(nowHour<24&&nowHour>=16){shift="中班"}
      if(moldNoUninstall!=""&&machineUninstall!=""){
        showRunning('','正在保存下模信息……','','',120000);
        google.script.run.withFailureHandler(judgeFailure).withSuccessHandler(result=>{
          arrMoldInfoScan=[];
          if(result[0]=="OK"){
            showResult('success','下模信息保存成功','','',false,'',2000,true)
          }
          else{
            showResult('error','下模信息保存失败',result[1],'',true,'','',false);
          }
        }).saveTestUninstallMold(loginWorkshop,loginProcess,loginName,nowDate,shift,moldNoUninstall,machineUninstall,arrMoldInfoScan);
      }
      else{
        showResult('error','信息错误','确认已选择机台且输入模具号','',true,'','',false);
      }
    }
    else{
      showResult('error','缺失模具信息','确认模具信息完整','',true,'','',false);
    }
  })

  /***动态生成Select的Option项***/
  function dynamicGenerationSelectOption(secTemp,arr){
    secTemp.empty()
    secTemp.append('<option value="">Select……</option>');
    for(let i=0;i<arr.length;i++){
      secTemp.append('<option value="'+arr[i]+'">'+arr[i]+'</option>');
    }
    if (secTemp.hasClass('select2-hidden-accessible')) {
      secTemp.select2('destroy');
    }
    var modal = secTemp.closest('.modal');
    secTemp.select2({
      theme: 'bootstrap',
      placeholder: '选择…… / Select……',
      allowClear: true,
      width: '100%',
      dropdownParent: modal
    });
    if (modal.length) {
      modal.off('shown.bs.modal.s2fix').on('shown.bs.modal.s2fix', function() {
        secTemp.select2({ width: '100%', dropdownParent: modal });
      });
    }
  }

  /***显示过程提示信息***/
  function showRunning(strIcon,strTitle,strText,strFooter,times){
    if(timerInterval){clearInterval(timerInterval)}
    Swal.fire({
      position: 'center',
      allowOutsideClick:false,
      icon:strIcon,
      title: swalTitle(strTitle, 'Loading...'),
      html: swalHtml(strText || '窗口将在 <b></b> 秒内关闭', 'Window will close in <b></b> seconds'),
      showConfirmButton:false,
      footer:strFooter,
      timer: times,
      timerProgressBar: true,
      didOpen: () => {
        Swal.showLoading();
        let b = Swal.getHtmlContainer().querySelector('b');
        timerInterval = setInterval(() => {
          if(b){
            b.textContent = (Swal.getTimerLeft()/1000).toFixed(0);
          }
        }, 1000)
      },
      willClose:()=>{
        if(timerInterval){clearInterval(timerInterval)}
      }
    }).then((result) => {
      if (result.dismiss === Swal.DismissReason.timer) {
        Swal.fire({
          icon: 'error',
          title: swalTitle('超时', 'Timeout'),
          html: swalHtml('程序在'+times/60000+'分钟内未响应，尝试再来一次', 'No response in '+times/60000+' min, please try again')
        });
      }
    })
  }

  /***显示结果提示信息***/
  function showResult(strIcon,strTitle,strText,strHtml,booleanButton,strFooter,times,booleanTimerProgressBar){
    if(timerInterval){clearInterval(timerInterval)}
    Swal.fire({
      position: 'center',
      allowOutsideClick:false,
      icon:strIcon,
      title: swalTitle(strTitle, ''),
      html: strHtml || swalHtml(strText, ''),
      showConfirmButton:booleanButton,
      footer:strFooter,
      timer: times,
      timerProgressBar: booleanTimerProgressBar
    })
  }

  /***后台无响应时返回错误信息***/
  function judgeFailure(){
    Swal.fire({
      icon: 'error',
      title: swalTitle('服务器未响应', 'Server Not Responding'),
      html: swalHtml('尝试再来一次', 'Please try again')
    });
  }  
  
</script>
