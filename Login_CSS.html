<style>

  .container{       
    max-width:100%;
    width:98%
  }
  
  /***登录窗口设置***/
  .login_box{
    position:absolute;
    left:1%;
    top:0%;
    width:98%;
    margin-left:0px;
    border-radius:0px;
    box-shadow: 10px 10px 5px #888;
    border:0px solid #666;
    text-align:center;
  }
    
  /***登录窗口背景设置***/
  .login_box::before{
    content:"";
    position:absolute;    /**一定要设置position:absolute,这样才能设置z-index，让背景处于内容的下一层**/
    z-index:-1;
    left:0px;
    top:0px;
    background-image:url("https://lh3.googleusercontent.com/u/0/d/1_mem5_r02pwkJzKx2BCW4S8XVRDYaWzk");
    background-size:100% 100%;
    background-repeat: no-repeat;      /*no-repeat;*/
    background-size:cover;      /*【cover】【contain】*/
    opacity:0.1;      /*透明度设置*/
    width:100%;
    height:100%;
    border-radius:0px;
  }

  /***画一个大圆***/
  .zjpie {
    overflow: hidden;
    position: relative;
    margin: 2px auto;
    padding: 0;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    list-style: none;
  }

  /***画一个正方形***/
  .zjslice {
    overflow: hidden;
    position: absolute;
    left: 200px;
    top: 200px;
    width: 360px;
    height: 360px;
    transform-origin: top left; 
  }

  /***正方形变形与大圆合成扇形1***/
  .zjslice-one {
    transform: rotate(-135deg) skew(-15deg,-15deg);
    background: #6699FF;
    border: 2px solid #4a4a4a;
    opacity:0.6
  }

  /***正方形变形与大圆合成扇形1中的文字***/
  .zjslicetext-one {
    transform: skew(15deg,15deg) rotate(135deg);
    position: absolute;left:120px;top:120px;
    z-index: 2;
    font-size: 32px;
    color: #FFFFFF;
  }

  /***正方形变形与大圆合成扇形2***/
  .zjslice-two {
    transform: rotate(-15deg) skew(-15deg,-15deg);
    background: #FF6699;
    border: 2px solid #4a4a4a;
    opacity:0.6
  }

  /***正方形变形与大圆合成扇形2中的文字***/
  .zjslicetext-two {
    transform:skew(15deg,15deg) rotate(-45deg);
    position: absolute;
    left: 120px;
    top: 120px;
    z-index: 2;
    font-size: 32px;
    color: #FFFFFF;
  }

  /***正方形变形与大圆合成扇形3***/
  .zjslice-three {
    transform: rotate(105deg) skew(-15deg,-15deg);
    background: #FFFF00;
    border: 2px solid #4a4a4a;
    opacity:0.6
  }

  /***正方形变形与大圆合成扇形3中的文字***/
  .zjslicetext-three {
    transform: skew(15deg,15deg) rotate(-45deg);
    position: absolute;
    left: 120px;
    top: 120px;
    z-index: 2;
    font-size: 32px;
    color: #FFFFFF;
  }

  /***画一个小圆***/
  .zjcenter{
    position: absolute;
    left: 108px;
    top: 108px;
    background: #FFCCFF;
    width: 180px;
    height: 180px;
    border: 2px solid #4a4a4a;
    border-radius: 50%;
    opacity:1
  }

  /***小圆中的文字***/
  .zjcentertext {
    position:absolute;
    left: 40px;
    top: 60px;
    z-index: 2;
    font-size: 32px;
    color: #FFFFFF;
  }

  /***赋于扇形和小圆的焦点***/
  .zjpie .zjslice, .zjpie .zjcenter{
    transition: 0.5s;
    cursor: pointer;
  }

  /***鼠标移到扇形和小圆的焦点后背景色***/
  .zjpie .zjslice:hover, .zjpie .zjcenter:hover{
    background: #777;
  }

  /***改变placeholder的文字颜色***/
  .zjInputText::-webkit-input-placeholder {
    color: red;
  }

  .filter-option {
    color: red !important;
    font-size: 24px !important;
    background: rgba(0,0,0,0) !important;
  }

  .bootstrap-select {
    border: 1px solid #E5E6E7;
    background: rgba(0,0,0,0) !important;
    /**opacity: 0;**/
  }

  .bootstrap-select button {
    border: 1px solid #E5E6E7;
    background: rgba(0,0,0,0) !important;
    /**opacity: 0;**/
  }

  .filter-option-inner-inner{
    background: rgba(255,255,255,0) !important;
  }

  .bootstrap-select .dropdown-toggle:focus{
    /**padding-right:25px;**/
    color:red;
    outline:none !important;
    background: rgba(255,255,255,0) !important;
  }

</style>
