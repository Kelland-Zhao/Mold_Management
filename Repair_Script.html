  /***禁用鼠标右键***/
  window.onload=function(){       
    document.onkeydown=function(){
      let e=window.event||arguments[0];
      if(e.keyCode==123){         
        return false;
      }
      else if((e.ctrlKey)&&(e.shiftKey)&&(e.keyCode==73)){
        return false;
      }
    }
    document.oncontextmenu=function(){
      return false;
    }
  }

  }
  
  /**加载窗口时预载数据**/
  $(document).ready(function(){
    initializationDatePicker();
    let loginWorkshop=sessionStorage.getItem("sessionLoginWorkshop");

    $("#loginWorkshop").text(loginWorkshop);
    $("#loginProcess").text(loginProcess);

    $("#loginName").text(loginName);
    if(loginWorkshop&&loginProcess&&loginId&&loginName){

    }
    else{
      showResult('error','缺失登陆信息','尝试关闭窗口重新登陆','',true,'','',false);
    }
  });

      }
      else{
        showResult('error','模具及机台信息错误','确认模具与机台信息一致','',true,'','',false);
      }
    }
    else{
      showResult('error','缺失模具信息','确认模具信息完整','',true,'','',false);
    }
  })

  

  /***动态生成Select的Option项***/
  function dynamicGenerationSelectOption(secTemp,arr){
    secTemp.empty()
    secTemp.append('<option value="" selected>Select……</option>');
    for(let i=0;i<arr.length;i++){
      secTemp.append('<option value="'+arr[i]+'">'+arr[i]+'</option>');
    }
    secTemp.selectpicker("val",[""]);
    secTemp.selectpicker('refresh');
  }

  /***显示过程提示信息***/
  function showRunning(strIcon,strTitle,strText,strFooter,times){
    if(timerInterval){clearInterval(timerInterval)}
    Swal.fire({
      position: 'center',
      allowOutsideClick:false,
      icon:strIcon,
      title:strTitle,
      text:strText,
      html: '窗口将在 <b></b> 秒内关闭',
      showConfirmButton:false,
      footer:strFooter,
      timer: times,
      timerProgressBar: true,
      didOpen: () => {
        // Swal.showLoading()
        let b = Swal.getHtmlContainer().querySelector('b')
        timerInterval = setInterval(() => {
          if(b){
            b.textContent = (Swal.getTimerLeft()/1000).toFixed(0);
          }
        }, 1000)
      },
      willClose:()=>{
        if(timerInterval){clearInterval(timerInterval)}
      }
    }).then((result) => {
      if (result.dismiss === Swal.DismissReason.timer) {
        Swal.fire("程序在"+times/60000+"分钟内未响应","尝试再来一次");
      }
    })
  }

  /***显示结果提示信息***/
  function showResult(strIcon,strTitle,strText,strHtml,booleanButton,strFooter,times,booleanTimerProgressBar){
    if(timerInterval){clearInterval(timerInterval)}
    Swal.fire({
      position: 'center',
      allowOutsideClick:false,
      icon:strIcon,
      title:strTitle,
      text:strText,
      html: strHtml,
      showConfirmButton:booleanButton,
      footer:strFooter,
      timer: times,
      timerProgressBar: booleanTimerProgressBar
    })
  }

  /***后台无响应时返回错误信息***/
  function judgeFailure(){
    Swal.fire("服务器未响应","尝试再来一次");
  }  
  
</script>
