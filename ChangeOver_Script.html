  /***动态生成Select的Option项***/
  function dynamicGenerationSelectOption(secTemp,arr){
    secTemp.empty()
    secTemp.append('<option value="">Select……</option>');
    for(let i=0;i<arr.length;i++){
      secTemp.append('<option value="'+arr[i]+'">'+arr[i]+'</option>');
    }
    if (secTemp.hasClass('select2-hidden-accessible')) {
      secTemp.select2('destroy');
    }
    secTemp.select2({
      theme: 'bootstrap',
      placeholder: '选择…… / Select……',
      allowClear: true,
      width: '100%'
    });
  }

  /***显示过程提示信息***/
  function showRunning(strIcon,strTitle,strText,strFooter,times){
    if(timerInterval){clearInterval(timerInterval)}
    Swal.fire({
      position: 'center',
      allowOutsideClick:false,
      icon:strIcon,
      title: swalTitle(strTitle, 'Loading...'),
      html: swalHtml(strText || '窗口将在 <b></b> 秒内关闭', 'Window will close in <b></b> seconds'),
      showConfirmButton:false,
      footer:strFooter,
      timer: times,
      timerProgressBar: true,
      didOpen: () => {
        Swal.showLoading();
        let b = Swal.getHtmlContainer().querySelector('b');
        timerInterval = setInterval(() => {
          if(b){
            b.textContent = (Swal.getTimerLeft()/1000).toFixed(0);
          }
        }, 1000)
      },
      willClose:()=>{
        if(timerInterval){clearInterval(timerInterval)}
      }
    }).then((result) => {
      if (result.dismiss === Swal.DismissReason.timer) {
        Swal.fire({
          icon: 'error',
          title: swalTitle('超时', 'Timeout'),
          html: swalHtml('程序在'+times/60000+'分钟内未响应，尝试再来一次', 'No response in '+times/60000+' min, please try again')
        });
      }
    })
  }

  /***显示结果提示信息***/
  function showResult(strIcon,strTitle,strText,strHtml,booleanButton,strFooter,times,booleanTimerProgressBar){
    if(timerInterval){clearInterval(timerInterval)}
    Swal.fire({
      position: 'center',
      allowOutsideClick:false,
      icon:strIcon,
      title: swalTitle(strTitle, ''),
      html: strHtml || swalHtml(strText, ''),
      showConfirmButton:booleanButton,
      footer:strFooter,
      timer: times,
      timerProgressBar: booleanTimerProgressBar
    })
  }

  /***后台无响应时返回错误信息***/
  function judgeFailure(){
    Swal.fire({
      icon: 'error',
      title: swalTitle('服务器未响应', 'Server Not Responding'),
      html: swalHtml('尝试再来一次', 'Please try again')
    });
  }  
  
</script>
